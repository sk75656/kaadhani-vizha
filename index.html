<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>காதணி விழா அழைப்பிதழ் | ரே.இ. சஷ்டிகா</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kavivanar&family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Mukta Malar', sans-serif;
            background-color: #2b0408;
            color: #fff;
            overflow-x: hidden;
            text-align: center;
        }
        h1, h2, h3, .tamil-font {
            font-family: 'Kavivanar', cursive;
        }
        
        /* Continuous Festive Background Container */
        .invitation-container {
            background: linear-gradient(to bottom, #4a050d 0%, #630611 25%, #800c19 50%, #50050e 75%, #2b0408 100%);
            position: relative;
            min-height: 100vh;
            width: 100%;
            padding-bottom: 50px;
        }

        /* Ambient Particle/Marigold Animation Layer */
        .marigold-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .petal {
            position: absolute;
            background: #ff9f00;
            border-radius: 50% 0 50% 50%;
            opacity: 0.8;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(720deg) translateX(100px);
                opacity: 0.3;
            }
        }

        /* Decorative Mango Leaves Garland (Maavilai) */
        .garland {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: repeat-x url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="100" height="40"><path d="M0,0 Q25,20 50,0 Q75,20 100,0 M25,12 Q25,35 15,40 Q25,35 25,12 M75,12 Q75,35 65,40 Q75,35 75,12" fill="none" stroke="%23228B22" stroke-width="2"/><circle cx="25" cy="12" r="3" fill="%23ff4500"/><circle cx="75" cy="12" r="3" fill="%23ff4500"/><circle cx="50" cy="5" r="4" fill="%23ffd700"/></svg>');
            z-index: 5;
        }

        /* Sections and Layout */
        section {
            padding: 60px 20px;
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Temple Gopuram Header */
        .temple-header {
            padding-top: 100px;
            animation: fadeInDown 2s ease-out;
        }
        .gopuram-svg {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            0% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
            100% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); }
        }

        /* Vilakku (Lamps) layout */
        .lamp-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        .lamp {
            width: 50px;
            animation: flicker 0.15s infinite alternate;
        }
        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 8px #ff4500); }
        }

        /* Typography & Content Cards */
        .welcome-text {
            color: #ffd700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .function-title {
            color: #fff;
            font-size: 3.5rem;
            text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff4500;
            margin: 15px 0;
            animation: pulse 2.5s infinite;
        }
        .child-name {
            color: #ffd700;
            font-size: 2.8rem;
            border-bottom: 2px dashed #ffd700;
            display: inline-block;
            padding-bottom: 5px;
            margin: 20px 0;
        }

        /* Instrument Animations */
        .instruments-box {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 40px 0;
        }
        .instrument {
            width: 90px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .nadaswaram {
            animation: floatLeft 4s ease-in-out infinite alternate;
        }
        .thavil {
            animation: floatRight 4s ease-in-out infinite alternate;
        }
        @keyframes floatLeft {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-15px) rotate(5deg); }
        }
        @keyframes floatRight {
            0% { transform: translateY(0) rotate(5deg); }
            100% { transform: translateY(-15px) rotate(-5deg); }
        }

        /* Elephant and Festival Elements */
        .elephant-container {
            margin: 30px 0;
        }
        .elephant-svg {
            width: 160px;
            animation: march 5s ease-in-out infinite alternate;
        }
        @keyframes march {
            0% { transform: translateX(-10px) rotate(-2deg); }
            100% { transform: translateX(10px) rotate(2deg); }
        }

        /* Details Card */
        .details-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
        }
        .info-row {
            margin: 20px 0;
            font-size: 1.3rem;
        }
        .info-label {
            color: #ff9f00;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 1.6rem;
            color: #fff;
        }

        /* Beautiful Animated Button */
        .map-btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff8c00, #ffd700);
            color: #4a050d;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            margin-top: 20px;
            animation: pulseButton 2s infinite;
        }
        .map-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.7);
        }
        @keyframes pulseButton {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 5px 20px rgba(255, 140, 0, 0.6); }
            100% { transform: scale(1); }
        }

        /* People Silhouettes */
        .people-bg {
            width: 100%;
            height: 80px;
            background: repeat-x bottom url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40"><path d="M10,40 L10,25 Q15,15 20,25 L20,40 M15,15 A4,4 0 1,1 15,7 A4,4 0 1,1 15,15 M35,40 L35,22 Q40,12 45,22 L45,40 M40,12 A4,4 0 1,1 40,4 A4,4 0 1,1 40,12 M70,40 L70,28 Q75,18 80,28 L80,40 M75,18 A4,4 0 1,1 75,10 A4,4 0 1,1 75,18 M100,40 L100,24 Q105,14 110,24 L110,40 M105,14 A4,4 0 1,1 105,6 A4,4 0 1,1 105,14" fill="%231a0205" opacity="0.6"/></svg>');
            margin-top: 40px;
        }

        /* Animations helpers */
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="marigold-layer" id="marigoldContainer"></div>
    <div class="garland"></div>

    <div class="invitation-container">
        
        <!-- Header Section -->
        <section class="temple-header">
            <!-- Traditional South Indian Temple Gopuram SVG Line Art -->
            <svg class="gopuram-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M10,110 L90,110 L80,95 L20,95 Z" fill="none" stroke="#ffd700" stroke-width="2"/>
                <path d="M20,95 L80,95 L72,75 L28,75 Z" fill="none" stroke="#ffd700" stroke-width="2"/>
                <path d="M28,75 L72,75 L66,55 L34,55 Z" fill="none" stroke="#ffd700" stroke-width="2"/>
                <path d="M34,55 L66,55 L60,35 L40,35 Z" fill="none" stroke="#ffd700" stroke-width="2"/>
                <path d="M40,35 L60,35 L54,15 L46,15 Z" fill="none" stroke="#ffd700" stroke-width="2"/>
                <!-- Kalasams on top -->
                <circle cx="50" cy="8" r="3" fill="#ffd700"/>
                <circle cx="44" cy="10" r="2" fill="#ffd700"/>
                <circle cx="56" cy="10" r="2" fill="#ffd700"/>
                <!-- Tiny details -->
                <line x1="50" y1="15" x2="50" y2="110" stroke="#ffd700" stroke-width="0.5" stroke-dasharray="2,2"/>
            </svg>

            <div class="lamp-container">
                <!-- Left Vilakku SVG -->
                <svg class="lamp" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20,10 Q17,20 12,25 Q20,28 28,25 Q23,20 20,10 Z" fill="#ff4500"/>
                    <ellipse cx="20" cy="27" rx="12" ry="5" fill="#ffd700"/>
                    <rect x="18" y="32" width="4" height="8" fill="#ffd700"/>
                    <ellipse cx="20" cy="39" rx="8" ry="2" fill="#ffd700"/>
                </svg>
                <!-- Right Vilakku SVG -->
                <svg class="lamp" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20,10 Q17,20 12,25 Q20,28 28,25 Q23,20 20,10 Z" fill="#ff4500"/>
                    <ellipse cx="20" cy="27" rx="12" ry="5" fill="#ffd700"/>
                    <rect x="18" y="32" width="4" height="8" fill="#ffd700"/>
                    <ellipse cx="20" cy="39" rx="8" ry="2" fill="#ffd700"/>
                </svg>
            </div>

            <p class="welcome-text">|| மிக மகிழ்வுடன் அழைக்கும் ||</p>
            <h1 class="function-title">காதணி விழா</h1>
            <p class="welcome-text">Ear Piercing Ceremony</p>
        </section>

        <!-- Name Section -->
        <section>
            <p style="font-size: 1.3rem; color: #ffbc42;">செல்வன் / செல்வி:</p>
            <h2 class="child-name">ரே.இ. சஷ்டிகா</h2>
        </section>

        <!-- Music Instruments Area -->
        <section class="instruments-box">
            <!-- Nadaswaram SVG -->
            <svg class="instrument nadaswaram" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
                <line x1="10" y1="20" x2="80" y2="20" stroke="#ffd700" stroke-width="4"/>
                <path d="M80,20 L95,10 L95,30 Z" fill="#ff8c00" stroke="#ffd700" stroke-width="2"/>
                <circle cx="20" cy="20" r="3" fill="#ff4500"/>
                <circle cx="35" cy="20" r="3" fill="#ff4500"/>
                <circle cx="50" cy="20" r="3" fill="#ff4500"/>
                <circle cx="65" cy="20" r="3" fill="#ff4500"/>
            </svg>
            
            <!-- Thavil SVG -->
            <svg class="instrument thavil" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="15" width="40" height="30" rx="5" fill="#8b4513" stroke="#ffd700" stroke-width="2"/>
                <ellipse cx="10" cy="30" rx="4" ry="15" fill="#f5f5dc" stroke="#ffd700"/>
                <ellipse cx="50" cy="30" rx="4" ry="15" fill="#f5f5dc" stroke="#ffd700"/>
                <line x1="10" y1="20" x2="50" y2="20" stroke="#ffd700" stroke-width="1"/>
                <line x1="10" y1="40" x2="50" y2="40" stroke="#ffd700" stroke-width="1"/>
            </svg>
        </section>

        <!-- Festival Elephant Section -->
        <section class="elephant-container">
            <!-- Decorated Festival Elephant Silhouette SVG -->
            <svg class="elephant-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M20,80 L25,50 Q30,30 50,30 Q70,30 75,45 Q85,45 90,55 Q95,60 92,70 Q88,72 85,65 Q82,58 75,58 L72,80 L62,80 L65,60 L45,60 L42,80 Z" fill="#ffd700"/>
                <!-- Nettipattam ornament design -->
                <path d="M65,35 Q70,38 73,45 L60,43 Z" fill="#ff4500"/>
                <circle cx="66" cy="40" r="2" fill="#fff"/>
                <circle cx="70" cy="42" r="2" fill="#fff"/>
            </svg>
        </section>

        <!-- Event Schedule Details -->
        <section class="details-card">
            <div class="info-row">
                <span class="info-label">தேதி / Date</span>
                <span class="info-value">05 . 07 . 2026</span>
            </div>
            
            <div class="info-row">
                <span class="info-label">நேரம் / Time</span>
                <span class="info-value">9:00 AM to 11:30 AM</span>
            </div>

            <div class="info-row">
                <span class="info-label">இடம் / Venue</span>
                <span class="info-value" style="font-size: 1.4rem; color: #ffd700;">Naatraayan Swamy Temple,</span>
                <span class="info-value" style="display:block; font-size: 1.2rem;">Vellakovil</span>
            </div>

            <!-- Interactive Map Link -->
            <a href="https://maps.app.goo.gl/3N4ybMy85C4drhXE6?g_st=aw" target="_blank" class="map-btn">📍 VIEW TEMPLE LOCATION</a>
        </section>

        <!-- Dynamic Silhouette People Border -->
        <div class="people-bg"></div>

    </div>

    <!-- JavaScript to auto-generate flying marigold petals dynamically -->
    <script>
        const container = document.getElementById('marigoldContainer');
        const colors = ['#ff9f00', '#ffc107', '#ff5722'];
        
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            // Random styling parameters
            const size = Math.random() * 12 + 8;
            petal.style.width = `${size}px`;
            petal.style.height = `${size}px`;
            petal.style.left = `${Math.random() * 100}vw`;
            petal.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // Random speed parameters for motion graphic look
            const duration = Math.random() * 5 + 4;
            petal.style.animationDuration = `${duration}s`;
            
            container.appendChild(petal);
            
            // Remove petal after animation ends
            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }

        // Generate petals consistently
        setInterval(createPetal, 300);
    </script>
</body>
</html>
