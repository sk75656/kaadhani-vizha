<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>காதணி விழா அழைப்பிதழ் | ரே.இ. சஷ்டிகா</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kavivanar&family=Mukta+Malar:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Mukta Malar', sans-serif;
            background-color: #1a0205;
            color: #fff;
            overflow-x: hidden;
            text-align: center;
        }

        h1, h2, h3, h4, .tamil-font {
            font-family: 'Kavivanar', cursive;
        }

        /* Video-Style Multi-Layered Cinematic Canvas */
        .invitation-container {
            background: 
                radial-gradient(circle at 50% 20%, rgba(255, 107, 107, 0.3), transparent 50%),
                radial-gradient(circle at 50% 70%, rgba(212, 175, 55, 0.2), transparent 60%),
                linear-gradient(to bottom, #2b0307 0%, #4a050d 20%, #6e0915 45%, #8a0c1b 70%, #4a050d 90%, #170103 100%);
            position: relative;
            min-height: 100vh;
            width: 100%;
            padding-bottom: 80px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        /* Ghibli-Inspired Sunbeams & Floating Petals Layer */
        .cinematic-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%, rgba(255,215,0,0.02) 70%, transparent 100%);
        }

        .flower-petal {
            position: absolute;
            background: linear-gradient(135deg, #ff9f00, #ff5722);
            border-radius: 50% 0 50% 50%;
            opacity: 0.9;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            animation: cinematicFall linear infinite;
        }

        @keyframes cinematicFall {
            0% {
                transform: translateY(-50px) rotate(0deg) translateX(0) scale(0.6);
                opacity: 0;
            }
            15% { opacity: 1; filter: brightness(1.2); }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(105vh) rotate(720deg) translateX(120px) scale(1);
                opacity: 0;
            }
        }

        /* Top Floral Festoons & Hanging Garlands */
        .royal-garland {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: repeat-x url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50" width="100" height="50"><path d="M0,5 Q25,35 50,5 Q75,35 100,5" fill="none" stroke="%23ff9f00" stroke-width="4"/><path d="M0,0 Q25,20 50,0 Q75,20 100,0" fill="none" stroke="%23d4af37" stroke-width="2"/><circle cx="25" cy="18" r="6" fill="%23d4af37"/><circle cx="75" cy="18" r="6" fill="%23d4af37"/><circle cx="50" cy="5" r="7" fill="%23ff4500"/><path d="M25,18 L25,38 M75,18 L75,38" stroke="%23ff4500" stroke-width="2" stroke-linecap="round" stroke-dasharray="1,3"/></svg>');
            z-index: 6;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
        }

        section {
            padding: 40px 20px;
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Custom Murugar Image Container with Premium Glow */
        .god-image-wrapper {
            padding-top: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .murugar-img {
            width: 100%;
            max-width: 340px;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(255, 190, 11, 0.5));
            animation: divineGlow 4s ease-in-out infinite alternate;
        }

        @keyframes divineGlow {
            0% { filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.4)); }
            100% { filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.75)); }
        }

        /* Grand Invitation Banner */
        .invitation-badge {
            color: #ffd700;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            letter-spacing: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.25), transparent);
            padding: 10px 40px;
            display: inline-block;
            margin-bottom: 20px;
            border-top: 1px solid rgba(255,215,0,0.4);
            border-bottom: 1px solid rgba(255,215,0,0.4);
        }

        .function-title {
            color: #ffffff;
            font-size: clamp(2.8rem, 8vw, 5rem);
            font-weight: bold;
            text-shadow: 0 0 20px #ff5722, 0 0 40px #ff2a00, 0 6px 15px rgba(0,0,0,0.9);
            letter-spacing: 2px;
            animation: scalePulse 4s infinite ease-in-out;
        }

        @keyframes scalePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .subtitle-eng {
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            color: #ffbc42;
            letter-spacing: 6px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Name Card Layout */
        .name-card {
            background: linear-gradient(135deg, rgba(43, 4, 8, 0.85), rgba(110, 9, 21, 0.5));
            border-radius: 25px;
            padding: 40px 20px;
            border: 2px solid rgba(255, 215, 0, 0.35);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,215,0,0.15);
            margin: 30px auto;
            max-width: 600px;
            width: 90%;
        }

        .label-selvi {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            color: #ffbc42;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.6);
            margin-bottom: 5px;
        }

        .child-name {
            color: #ffd700;
            font-size: clamp(2.5rem, 7vw, 4.2rem);
            text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 6px 12px rgba(0,0,0,0.7);
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* High-Detail Musical Canopy & Traditional Dancers */
        .music-dance-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 25px;
            padding: 40px 20px;
            border-left: 3px solid #ffd700;
            border-right: 3px solid #ffd700;
            margin: 40px auto;
            width: 90%;
            max-width: 800px;
        }

        .section-accent-title {
            color: #ffd700;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.6);
            border-bottom: 1px dashed rgba(255,215,0,0.2);
            padding-bottom: 15px;
        }

        .assets-flex-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .asset-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1 1 120px;
            max-width: 160px;
        }

        .instrument-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
        }

        .nadaswaram-anim {
            animation: nadaswaramSway 5s ease-in-out infinite alternate;
            transform-origin: top left;
        }

        .thavil-anim {
            animation: thavilBounce 0.8s ease-in-out infinite alternate;
        }

        @keyframes nadaswaramSway {
            0% { transform: rotate(-5deg) translateY(0); }
            100% { transform: rotate(10deg) translateY(-8px); }
        }

        @keyframes thavilBounce {
            0% { transform: translateY(0) scale(0.98); }
            100% { transform: translateY(-6px) scale(1.02); }
        }

        /* Classical Dancer Silhouette Art */
        .dancer-svg {
            width: 100%;
            max-width: 85px;
            height: auto;
            filter: drop-shadow(0 5px 10px rgba(255,140,0,0.4));
        }

        .dancer-left {
            animation: dancerSwayLeft 3s ease-in-out infinite alternate;
        }

        .dancer-right {
            animation: dancerSwayRight 3s ease-in-out infinite alternate;
        }

        @keyframes dancerSwayLeft {
            0% { transform: scaleX(1) rotate(-3deg); }
            100% { transform: scaleX(1) rotate(3deg) translateY(-4px); }
        }

        @keyframes dancerSwayRight {
            0% { transform: scaleX(-1) rotate(-3deg); }
            100% { transform: scaleX(-1) rotate(3deg) translateY(-4px); }
        }

        /* Premium Event Details Board */
        .premium-details-board {
            background: linear-gradient(135deg, rgba(74, 5, 13, 0.95) 0%, rgba(26, 2, 5, 0.98) 100%);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 45px 25px;
            margin: 45px auto;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 25px 55px rgba(0,0,0,0.8), inset 0 0 30px rgba(212,175,55,0.15);
        }

        .detail-block {
            margin-bottom: 35px;
            position: relative;
        }

        .detail-block:last-child {
            margin-bottom: 0;
        }

        .block-label {
            color: #ff9f00;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            letter-spacing: 3px;
        }

        .block-value {
            font-size: clamp(1.5rem, 4.5vw, 2.2rem);
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* High-Attraction Video-Style Action Button */
        .map-action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #d4af37, #ff8c00, #d4af37);
            background-size: 200% auto;
            color: #1a0205;
            font-weight: 800;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 15px;
            border: 2px solid #ffffff;
            width: 90%;
            max-width: 400px;
            animation: shimmerEffect 4s linear infinite, glowPulse 2s infinite;
        }

        @keyframes shimmerEffect {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4), 0 0 0 0px rgba(255,215,0,0.3); }
            70% { box-shadow: 0 15px 35px rgba(255, 140, 0, 0.6), 0 0 0 15px rgba(255,215,0,0); }
            100% { box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4), 0 0 0 0px rgba(255,215,0,0); }
        }

        .map-action-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 140, 0, 0.7);
        }

        /* Multi-Layer Silhouette Celebration Backdrop at the Bottom */
        .festival-crowd-footer {
            width: 100%;
            height: 150px;
            position: relative;
            background: 
                repeat-x bottom url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 50" width="120" height="50"><path d="M5,50 L5,25 Q12,10 18,25 L20,50 M35,50 L35,20 Q42,5 49,22 L50,50 M80,50 L80,23 Q87,8 94,25 L95,50" fill="%23240205" opacity="0.95"/></svg>'),
                repeat-x bottom url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 50" width="120" height="50"><path d="M15,50 L15,28 Q22,12 29,28 L30,50 M60,50 L60,24 Q67,10 74,25 L75,50 M100,50 L100,27 Q107,13 114,27 L115,50" fill="%23120002" opacity="1"/></svg>');
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="cinematic-overlay" id="petalCanvas"></div>
    <div class="royal-garland"></div>

    <div class="invitation-container">
        
        <section class="god-image-wrapper">
            <img class="murugar-img" src="murugan.png" alt="">

            <div style="margin-top: 30px; width: 100%;">
                <span class="invitation-badge">|| மிக மகிழ்வுடன் அழைக்கும் ||</span>
                <h1 class="function-title">காதணி விழா</h1>
                <p class="subtitle-eng">Ear Piercing Ceremony</p>
            </div>
        </section>

        <section>
            <div class="name-card">
                <p class="label-selvi">செல்வி:</p>
                <h2 class="child-name">ரே.இ. சஷ்டிகா</h2>
            </div>
        </section>

        <section class="music-dance-section">
            <h3 class="section-accent-title">மக்கள் அனைவரும் வருக</h3>
            
            <div class="assets-flex-row">
                <div class="asset-wrapper">
                    <svg class="dancer-svg dancer-left" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M30,15 A5,5 0 1,1 30,5 A5,5 0 1,1 30,15 M30,15 Q20,25 15,35 Q25,32 30,28 Q35,32 45,35 Q40,25 30,15 M30,28 L30,55 L15,85 L30,70 L45,85 L30,55 Z" fill="#ffd700" stroke="#ff8c00" stroke-width="1"/>
                    </svg>
                </div>

                <div class="asset-wrapper" style="max-width: 140px;">
                    <svg class="instrument-svg nadaswaram-anim" viewBox="0 0 140 50" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10,22 L100,15 L100,29 Z" fill="#5c2c16" stroke="#d4af37" stroke-width="1.5"/>
                        <path d="M100,15 L130,5 L135,43 L100,29 Z" fill="#cc7a00" stroke="#ffd700" stroke-width="2"/>
                        <circle cx="12" cy="22" r="3" fill="#ffd700"/>
                        <line x1="35" y1="20" x2="35" y2="24" stroke="#ffd700" stroke-width="2"/>
                        <line x1="55" y1="20" x2="55" y2="24" stroke="#ffd700" stroke-width="2"/>
                        <line x1="75" y1="20" x2="75" y2="24" stroke="#ffd700" stroke-width="2"/>
                    </svg>
                </div>
                
                <div class="asset-wrapper" style="max-width: 90px;">
                    <svg class="instrument-svg thavil-anim" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                        <rect x="12" y="18" width="56" height="44" rx="10" fill="#662200" stroke="#d4af37" stroke-width="2"/>
                        <ellipse cx="12" cy="40" rx="4" ry="22" fill="#fff8f0" stroke="#d4af37" stroke-width="1.5"/>
                        <ellipse cx="68" cy="40" rx="4" ry="22" fill="#fff8f0" stroke="#d4af37" stroke-width="1.5"/>
                        <path d="M16,22 L64,22 M16,58 L64,58 M16,40 L64,40" stroke="#ff9f00" stroke-width="1" stroke-dasharray="3,3"/>
                    </svg>
                </div>

                <div class="asset-wrapper">
                    <svg class="dancer-svg dancer-right" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M30,15 A5,5 0 1,1 30,5 A5,5 0 1,1 30,15 M30,15 Q20,25 15,35 Q25,32 30,28 Q35,32 45,35 Q40,25 30,15 M30,28 L30,55 L15,85 L30,70 L45,85 L30,55 Z" fill="#ffd700" stroke="#ff8c00" stroke-width="1"/>
                    </svg>
                </div>
            </div>
        </section>

        <section class="premium-details-board">
            <div class="detail-block">
                <span class="block-label">📅 தேதி / DATE</span>
                <span class="block-value">05 . 07 . 2026</span>
            </div>
            
            <div class="detail-block">
                <span class="block-label">⏱️ நேரம் / TIME</span>
                <span class="block-value">9:00 AM to 11:30 AM</span>
            </div>

            <div class="detail-block">
                <span class="block-label">🕌 இடம் / VENUE</span>
                <span class="block-value" style="color: #ffd700; font-size: clamp(1.6rem, 5vw, 2.4rem);">Naatraayan Swamy Temple,</span>
                <span class="block-value" style="display: block; font-size: clamp(1.2rem, 3.5vw, 1.6rem); margin-top: 5px; opacity: 0.9;">Vellakovil</span>
            </div>

            <a href="https://maps.app.goo.gl/3N4ybMy85C4drhXE6?g_st=aw" target="_blank" class="map-action-button">
                <span>📍 VIEW TEMPLE LOCATION</span>
            </a>
        </section>

        <div class="festival-crowd-footer"></div>

    </div>

    <script>
        const canvasContainer = document.getElementById('petalCanvas');
        const petalPalettes = ['#ff8c00', '#ffa500', '#ffd700', '#ff4500', '#ffbe0b'];
        
        function generatePremiumPetal() {
            const petalElement = document.createElement('div');
            petalElement.classList.add('flower-petal');
            
            // Random sizing matrices for high cinematic depth of field
            const dimension = Math.random() * 16 + 10;
            petalElement.style.width = `${dimension}px`;
            petalElement.style.height = `${dimension}px`;
            petalElement.style.left = `${Math.random() * 100}vw`;
            petalElement.style.backgroundColor = petalPalettes[Math.floor(Math.random() * petalPalettes.length)];
            
            // Setting random floating dynamic movement speed
            const fallVelocity = Math.random() * 5 + 5;
            petalElement.style.animationDuration = `${fallVelocity}s`;
            petalElement.style.transform = `rotate(${Math.random() * 360}deg)`;
            
            canvasContainer.appendChild(petalElement);
            
            // Garbage collection clean up execution loops
            setTimeout(() => {
                petalElement.remove();
            }, fallVelocity * 1000);
        }

        // Loop execution matrix for consistent fluid graphics performance
        setInterval(generatePremiumPetal, 180);
    </script>
</body>
</html>
