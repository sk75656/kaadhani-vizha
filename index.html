<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>மகா காதணி விழா அழைப்பிதழ் | ரே.இ. சஷ்டிகா</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kavivanar&family=Mukta+Malar:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Mukta Malar', sans-serif;
            background-color: #1a0205;
            color: #fff;
            overflow-x: hidden;
            text-align: center;
        }
        h1, h2, h3, h4, .tamil-font {
            font-family: 'Kavivanar', cursive;
        }
        
        /* Grand Textured Festive Background with Ghibli Style Lighting Base */
        .invitation-container {
            background: 
                radial-gradient(circle at 50% 10%, rgba(255, 165, 0, 0.15), transparent 60%),
                linear-gradient(to bottom, #360207 0%, #4a050d 15%, #6e0915 40%, #8a0c1b 65%, #4a050d 85%, #1a0205 100%);
            position: relative;
            min-height: 100vh;
            width: 100%;
            padding-bottom: 60px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* Ambient Dynamic Marigold and Gold Confetti Rain Layer */
        .ambient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .flower-petal {
            position: absolute;
            background: #ff9f00;
            border-radius: 50% 0 50% 50%;
            opacity: 0.85;
            filter: drop-shadow(0 2px 4px rgba(255,69,0,0.3));
            animation: ghibliFall linear infinite;
        }
        @keyframes ghibliFall {
            0% {
                transform: translateY(-40px) rotate(0deg) translateX(0) scale(0.8);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 0.9; }
            100% {
                transform: translateY(105vh) rotate(1080deg) translateX(150px) scale(1.1);
                opacity: 0;
            }
        }

        /* Intricate Double Mango Leaves & Marigold Hanging Garlands */
        .grand-garland {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: repeat-x url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50" width="100" height="50"><path d="M0,5 Q25,30 50,5 Q75,30 100,5" fill="none" stroke="%23ff8c00" stroke-width="3" stroke-dasharray="1,3"/><path d="M0,0 Q25,25 50,0 Q75,25 100,0 M25,15 Q25,45 12,50 Q25,45 25,15 M75,15 Q75,45 62,50 Q75,45 75,15" fill="%231E5631" stroke="%23143F24" stroke-width="1.5"/><circle cx="25" cy="15" r="5" fill="%23ff4500"/><circle cx="75" cy="15" r="5" fill="%23ff4500"/><circle cx="50" cy="5" r="6" fill="%23ffd700"/><circle cx="0" cy="0" r="4" fill="%23ffd700"/><circle cx="100" cy="0" r="4" fill="%23ffd700"/></svg>');
            z-index: 6;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        /* Layout Structure */
        section {
            padding: 50px 20px;
            position: relative;
            z-index: 2;
            max-width: 750px;
            margin: 0 auto;
        }

        /* Multi-layered Detailed Temple Gopuram with Soft Glow Effects */
        .temple-gopuram-section {
            padding-top: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .detailed-gopuram {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(255, 190, 11, 0.45));
            animation: warmGlow 4s ease-in-out infinite alternate;
        }
        @keyframes warmGlow {
            0% { filter: drop-shadow(0 0 15px rgba(255, 175, 0, 0.4)); }
            100% { filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.8)); }
        }

        /* Divine Traditional Lamps (Kuthu Vilakku) with Animated Flaring Flames */
        .kuthu-vilakku-row {
            display: flex;
            justify-content: space-between;
            width: 85%;
            margin: -40px auto 20px auto;
        }
        .kuthu-vilakku {
            width: 70px;
            height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
        }
        .flame-glow {
            animation: flameFlicker 0.2s infinite alternate;
            transform-origin: center bottom;
        }
        @keyframes flameFlicker {
            0% { transform: scale(0.92) rotate(-1deg); opacity: 0.85; }
            100% { transform: scale(1.08) rotate(2deg); opacity: 1; filter: drop-shadow(0 0 8px #ff4500); }
        }

        /* Typography & Artistic Borders */
        .welcome-badge {
            color: #ffd700;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 25px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(255,215,0,0.3);
            margin-bottom: 25px;
        }
        .grand-title-box {
            position: relative;
            padding: 10px;
            margin: 15px 0;
        }
        .function-title {
            color: #ffffff;
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 15px #ff7b00, 0 0 30px #ff2a00, 0 4px 10px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            animation: gentlePulse 3s infinite ease-in-out;
        }
        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .subtitle-eng {
            font-size: 1.4rem;
            color: #ffbc42;
            letter-spacing: 4px;
            font-weight: 600;
            margin-top: -5px;
        }

        /* Name Presentation Section */
        .name-card {
            background: rgba(26, 2, 5, 0.6);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px auto;
            max-width: 90%;
        }
        .label-selvi {
            font-size: 2.2rem;
            color: #ffbc42;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }
        .child-name {
            color: #ffd700;
            font-size: 3.4rem;
            text-shadow: 0 0 10px rgba(255,215,0,0.4), 0 4px 8px rgba(0,0,0,0.6);
            font-weight: bold;
            display: inline-block;
            position: relative;
        }

        /* Elaborate Native Musical Instruments Area */
        .orchestra-canopy {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            border-top: 2px solid #ffd700;
            border-bottom: 2px solid #ffd700;
            margin: 40px 15px;
        }
        .orchestra-title {
            color: #ff9f00;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .instruments-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .instrument-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .instrument-art {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
        }
        .nadaswaram-motion {
            animation: nadaswaramWave 4s ease-in-out infinite alternate;
            transform-origin: left center;
        }
        .thavil-motion {
            animation: thavilBeat 0.6s linear infinite alternate;
        }
        @keyframes nadaswaramWave {
            0% { transform: rotate(-8deg) translateY(0); }
            100% { transform: rotate(12deg) translateY(-10px); }
        }
        @keyframes thavilBeat {
            0% { transform: scale(0.97) translateY(0); }
            100% { transform: scale(1.03) translateY(-4px); }
        }
        .instrument-label {
            font-size: 0.95rem;
            color: #ffd700;
            margin-top: 8px;
            opacity: 0.9;
        }

        /* Majestic Royal Festival Elephant Section */
        .festival-procession {
            margin: 40px 0;
            position: relative;
        }
        .majestic-elephant {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7));
            animation: majesticWalk 6s ease-in-out infinite alternate;
        }
        @keyframes majesticWalk {
            0% { transform: translateX(-15px) rotate(-1.5deg); }
            100% { transform: translateX(15px) rotate(2.5deg); }
        }

        /* Grand Luxury Details Layout Box */
        .luxury-details-board {
            background: linear-gradient(135deg, rgba(74, 5, 13, 0.95) 0%, rgba(43, 4, 8, 0.95) 100%);
            border: 3px double #ffd700;
            border-radius: 20px;
            padding: 40px 25px;
            margin: 40px 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,215,0,0.2);
            position: relative;
        }
        .luxury-details-board::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 14px;
            pointer-events: none;
        }
        .event-card-item {
            margin-bottom: 30px;
        }
        .event-card-item:last-child {
            margin-bottom: 0;
        }
        .badge-icon {
            font-size: 1.8rem;
            margin-bottom: 5px;
            display: inline-block;
            filter: drop-shadow(0 0 5px #ffd700);
        }
        .card-heading {
            color: #ff9f00;
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        .card-body-text {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* Highly Attractive Animated Pulsing Map Navigation Button */
        .grand-navigation-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(45deg, #cc2b02, #ff8c00, #ffd700);
            background-size: 200% auto;
            color: #1a0205;
            font-weight: 800;
            font-size: 1.3rem;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.5), 0 0 0 0px rgba(255,215,0,0.4);
            transition: all 0.4s ease;
            margin-top: 25px;
            border: 2px solid #ffffff;
            animation: fluidShimmer 3s infinite, dynamicPulse 2s infinite;
        }
        @keyframes fluidShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes dynamicPulse {
            0% { box-shadow: 0 8px 25px rgba(255, 69, 0, 0.4), 0 0 0 0px rgba(255,215,0,0.4); }
            70% { box-shadow: 0 12px 35px rgba(255, 69, 0, 0.7), 0 0 0 15px rgba(255,215,0,0); }
            100% { box-shadow: 0 8px 25px rgba(255, 69, 0, 0.4), 0 0 0 0px rgba(255,215,0,0); }
        }
        .grand-navigation-button:hover {
            transform: translateY(-4px) scale(1.03);
            filter: brightness(1.1);
        }

        /* Multi-layered Ghibli Traditional Silhouette Crowd Border at the bottom */
        .celebration-crowd-base {
            width: 100%;
            height: 140px;
            position: relative;
            background: 
                repeat-x bottom url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 50" width="120" height="50"><path d="M5,50 L5,28 Q10,14 15,26 L17,50 M10,14 A5,5 0 1,1 10,4 A5,5 0 1,1 10,14 M30,50 L30,22 Q37,8 44,24 L45,50 M37,8 A5,5 0 1,1 37,0 A5,5 0 1,1 37,8 M75,50 L75,26 Q82,12 88,28 L90,50 M82,12 A5,5 0 1,1 82,2 A5,5 0 1,1 82,12" fill="%23260307" opacity="0.95"/></svg>'),
                repeat-x bottom url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 50" width="120" height="50"><path d="M15,50 L15,32 Q22,18 28,34 L30,50 M22,18 A4.5,4.5 0 1,1 22,9 A4.5,4.5 0 1,1 22,18 M55,50 L55,25 Q62,10 68,26 L70,50 M62,10 A4.5,4.5 0 1,1 62,1 A4.5,4.5 0 1,1 62,10 M95,50 L95,30 Q102,16 108,32 L110,50 M102,16 A4.5,4.5 0 1,1 102,7 A4.5,4.5 0 1,1 102,16" fill="%23140103" opacity="1"/> </svg>');
            margin-top: 50px;
        }

        /* Subtle Audio Wave Aesthetic Indicator */
        .sound-wave-indicator {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            height: 30px;
            margin: 20px 0;
        }
        .wave-bar {
            width: 4px;
            background-color: #ffd700;
            border-radius: 2px;
            animation: soundActive 0.5s ease-in-out infinite alternate;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 15px; }
        .wave-bar:nth-child(3) { animation-delay: 0.25s; height: 25px; }
        .wave-bar:nth-child(4) { animation-delay: 0.05s; height: 10px; }
        .wave-bar:nth-child(5) { animation-delay: 0.18s; height: 20px; }
        @keyframes soundActive {
            0% { transform: scaleY(0.3); opacity: 0.6; }
            100% { transform: scaleY(1.1); opacity: 1; }
        }
    </style>
</head>
